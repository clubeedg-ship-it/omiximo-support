# Example secrets. Copy to real manifests (or create with `kubectl create secret`)
# and fill in actual values. DO NOT commit the populated versions — both names
# are listed in .gitignore.
#
# omiximo-env: consumed by the API via envFrom. Holds the app runtime config.
# omiximo-db:  consumed by the Postgres StatefulSet.
#
# Create them imperatively (recommended — keeps values out of files):
#
#   kubectl -n omiximo-support create secret generic omiximo-db \
#     --from-literal=POSTGRES_USER=omiximo \
#     --from-literal=POSTGRES_PASSWORD='<password>' \
#     --from-literal=POSTGRES_DB=omiximo_support
#
#   kubectl -n omiximo-support create secret generic omiximo-env \
#     --from-env-file=backend/.env
#
apiVersion: v1
kind: Secret
metadata:
  name: omiximo-db
  namespace: omiximo-support
type: Opaque
stringData:
  POSTGRES_USER: omiximo
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: omiximo_support
---
apiVersion: v1
kind: Secret
metadata:
  name: omiximo-env
  namespace: omiximo-support
type: Opaque
stringData:
  # Must match the omiximo-db credentials and service host `db`.
  DATABASE_URL: postgresql+asyncpg://omiximo:CHANGE_ME@db:5432/omiximo_support
  FERNET_KEY: CHANGE_ME
  LLM_API_KEY: CHANGE_ME
  LLM_MODEL: mistralai/mistral-nemo
  LLM_API_BASE_URL: https://openrouter.ai/api/v1
  ALLOWED_EMAIL_DOMAIN: omiximo.nl
