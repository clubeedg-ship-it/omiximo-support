services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: omiximo
      POSTGRES_PASSWORD: omiximo_dev
      POSTGRES_DB: omiximo_support
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omiximo -d omiximo_support"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://omiximo:omiximo_dev@db:5432/omiximo_support}
      FERNET_KEY: ${FERNET_KEY:?Set FERNET_KEY in .env}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://openrouter.ai/api/v1}
      MIRAKL_POLL_INTERVAL_SECONDS: ${MIRAKL_POLL_INTERVAL_SECONDS:-300}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
