# Static serving for the Vite-built SPA.
server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight liveness/readiness endpoint for k8s probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Fingerprinted build assets are immutable — cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback: unknown paths return index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry HTML, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
